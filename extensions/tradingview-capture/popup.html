<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Analyst Ledger TV</title>
  <style>
    body {
      font-family: "Source Sans 3", system-ui, sans-serif;
      margin: 0;
      padding: 12px;
      width: 280px;
      background: #0f1419;
      color: #e7ecf1;
    }
    h1 { font-size: 14px; margin: 0 0 8px; }
    p { font-size: 12px; color: #8b9aab; margin: 0 0 10px; }
    label { display: block; font-size: 11px; color: #8b9aab; margin-top: 8px; }
    input[type="text"], textarea {
      width: 100%; box-sizing: border-box;
      background: #1a222c; border: 1px solid #2a3542; color: #e7ecf1;
      padding: 6px; margin-top: 4px; font-size: 12px;
    }
    button {
      margin-top: 10px; width: 100%; padding: 8px;
      background: #3d9cf0; border: 0; color: #0f1419; font-weight: 600; cursor: pointer;
    }
    button.secondary { background: #2a3542; color: #e7ecf1; }
    #status { font-size: 11px; margin-top: 8px; min-height: 1.2em; }
    .row { display: flex; gap: 6px; }
    .row button { flex: 1; }
  </style>
</head>
<body>
  <h1>TradingView → Ledger</h1>
  <p>Captures symbol, interval, drawing counts, and notes. No cursor recording.</p>
  <label>Local ingest endpoint
    <input id="endpoint" type="text" />
  </label>
  <label><input id="autoSession" type="checkbox" checked /> Auto-start session</label>
  <label>Note
    <textarea id="note" rows="3" placeholder="Thesis fragment / what you're checking…"></textarea>
  </label>
  <div class="row">
    <button id="snapshot" class="secondary" type="button">Snapshot chart</button>
    <button id="sendNote" type="button">Log note</button>
  </div>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
