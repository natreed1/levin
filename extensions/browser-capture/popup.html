<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Yahoo → Ledger</title>
  <style>
    body {
      font-family: system-ui, sans-serif; margin: 0; padding: 12px; width: 300px;
      background: #0f1419; color: #e7ecf1;
    }
    h1 { font-size: 14px; margin: 0 0 6px; }
    p { font-size: 12px; color: #8b9aab; margin: 0 0 10px; line-height: 1.35; }
    label { display: block; font-size: 11px; color: #8b9aab; margin-top: 8px; }
    input[type=text] {
      width: 100%; box-sizing: border-box; margin-top: 4px;
      background: #1a222c; border: 1px solid #2a3542; color: #e7ecf1; padding: 6px;
    }
    button {
      margin-top: 10px; width: 100%; padding: 8px; border: 0;
      background: #3d9cf0; color: #0f1419; font-weight: 600; cursor: pointer;
    }
    button.secondary { background: #2a3542; color: #e7ecf1; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 8px; }
    .row button { margin-top: 0; font-size: 11px; padding: 7px 4px; }
    #status { font-size: 12px; margin-top: 10px; min-height: 1.4em; white-space: pre-wrap; }
    .ok { color: #2ecc71; }
    .err { color: #e74c3c; }
    ol { margin: 0 0 8px 1.1rem; padding: 0; font-size: 11px; color: #8b9aab; }
  </style>
</head>
<body>
  <h1>Yahoo Finance → Ledger</h1>
  <p>Logs quote pages + tabs (statistics, news, …) and optional price scrape. Notes not required.</p>
  <label><input id="enabled" type="checkbox" checked /> Capture enabled</label>
  <label><input id="autoSession" type="checkbox" checked /> Auto-start session</label>
  <label>Endpoint <input id="endpoint" type="text" /></label>
  <button id="capture" type="button">Capture this tab now</button>
  <p style="margin:12px 0 0">Outcome (optional)</p>
  <div class="row">
    <button class="secondary" type="button" data-tag="idea">idea</button>
    <button class="secondary" type="button" data-tag="followup">followup</button>
    <button class="secondary" type="button" data-tag="reject">reject</button>
    <button class="secondary" type="button" data-tag="neutral">neutral</button>
  </div>
  <button id="openDash" class="secondary" type="button">Open Timeline</button>
  <div id="status"></div>
  <p style="margin-top:12px">Setup</p>
  <ol>
    <li>Dashboard at http://127.0.0.1:8788</li>
    <li>Open a Yahoo quote / Statistics / News tab</li>
    <li>Reload extension after updates</li>
  </ol>
  <script src="popup.js"></script>
</body>
</html>
