# Unified Workflow Messenger on Fly.io
#
# Deploy from the REPOSITORY ROOT (so src/analyst_ledger is in the build context):
#   fly deploy --config messenger/fly.toml --dockerfile Dockerfile
#
# Volume + secrets:
#   fly volumes create messenger_data --region sjc --size 3 -a levin
#   fly secrets set -a levin \
#     MESSENGER_INVITE_TOKEN='...' \
#     MESSENGER_SESSION_SECRET='...'
#
# Optional managed Postgres for shared users/rooms at scale:
#   fly postgres create --name levin-db
#   fly postgres attach levin-db -a levin
#   fly secrets set -a levin MESSENGER_DATABASE_URL="$DATABASE_URL"
#
# Per-user ledgers live on the volume at /data/users/{user_id}/
# (SQLite + JSONL). Automations run in-cloud via CloudScheduler.

app = "levin"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile"

[env]
  MESSENGER_DATA_DIR = "/data"
  MESSENGER_USERS_DIR = "/data/users"
  MESSENGER_COOKIE_SECURE = "1"
  MESSENGER_PUBLIC_BASE_URL = "https://levin.fly.dev"
  MESSENGER_AUTO_VERIFY = "0"
  MESSENGER_SCHEDULER = "1"
  PYTHONPATH = "/app/src:/app"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[http_service.checks]]
  interval = "15s"
  timeout = "2s"
  grace_period = "10s"
  method = "GET"
  path = "/healthz"

[[mounts]]
  source = "messenger_data"
  destination = "/data"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
