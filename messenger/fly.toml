# Fly.io config for the cloud messenger.
# Deploy from this directory:  cd messenger && fly launch  (or fly deploy)
#
# After first launch, create a volume and set secrets:
#   fly volumes create messenger_data --region <region> --size 1
#   fly secrets set MESSENGER_INVITE_TOKEN='...' MESSENGER_SESSION_SECRET='...'

app = "levin"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile"

[env]
  MESSENGER_DATA_DIR = "/data"
  MESSENGER_COOKIE_SECURE = "1"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[http_service.checks]]
  interval = "15s"
  timeout = "2s"
  grace_period = "10s"
  method = "GET"
  path = "/healthz"

[[mounts]]
  source = "messenger_data"
  destination = "/data"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
